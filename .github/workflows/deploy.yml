name: CI/CD Deployment for Laravel API Restvue

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Configurar SSH para conectarse al VPS
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 2. Instalar sshpass
      - name: Instalar sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      # 3. Conectar y desplegar al VPS
      - name: Desplegar al VPS
        run: |
          sshpass -p "${{ secrets.VPS_PASSWORD }}" ssh -o StrictHostKeyChecking=no root@147.79.78.97 <<EOF-
          echo "Navegando al directorio del proyecto"
          cd /var/www/api-restvue
          echo "Haciendo pull de los últimos cambios"
          git pull origin main
          echo "Instalando dependencias de Composer"
          composer install --no-dev --optimize-autoloader
          echo "Ejecutando migraciones"
          php artisan migrate --force
          echo "Limpiando y cacheando configuración"
          php artisan config:clear
          php artisan config:cache
          php artisan route:cache
          echo "Despliegue finalizado"
          EOF-

      # 4. Notificar estado en Telegram
      - name: Notificar estado en Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MESSAGE="✅ Despliegue exitoso de Laravel API Restvue en el VPS."
          else
            MESSAGE="❌ El despliegue falló. Revisa el flujo de CI/CD."
          fi
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="$MESSAGE"
